<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>

    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.form-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.form-group input{
    flex:1;
    min-width:180px;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#007bff;
    color:white;
}

tr:nth-child(even){
    background:#f2f2f2;
}

.action-btn{
    margin:3px;
}

.edit-btn{
    background:#28a745;
}

.delete-btn{
    background:#dc3545;
}

.edit-btn:hover{
    background:#1e7e34;
}

.delete-btn:hover{
    background:#bd2130;
}

/* Mobile */

@media(max-width:768px){

.form-group{
    flex-direction:column;
}

.form-group input,
button{
    width:100%;
}

table,
thead,
tbody,
th,
td,
tr{
    display:block;
}

thead{
    display:none;
}

tr{
    background:white;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
    overflow:hidden;
}

td{
    border:none;
    border-bottom:1px solid #eee;
    position:relative;
    padding-left:50%;
    text-align:left;
}

td:before{
    position:absolute;
    left:15px;
    top:12px;
    font-weight:bold;
}

td:nth-child(1):before{
    content:"ID";
}

td:nth-child(2):before{
    content:"Name";
}

td:nth-child(3):before{
    content:"Email";
}

td:nth-child(4):before{
    content:"Age";
}

td:nth-child(5):before{
    content:"Action";
}
}
</style>

</head>

<body>

     <input type="email" id="mail" placeholder="Enter Email">

<button id="sendBtn" type="button" onclick="sendEmail()">
    Send Email
</button>

<p id="msg"></p>


<div class="container">
<h2>Student CRUD</h2>
<input type="hidden" id="studentId">

<div class="form-group">

<input type="text" id="name" placeholder="Name">

<input type="email" id="email" placeholder="Email">

<input type="number" id="age" placeholder="Age">

<button onclick="saveStudent()">Save</button>

</div>
<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
    <th>Email</th>
<th>Age</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentTable"></tbody>

</table>
</div>



<script>

const API="https://djangoapi-f17z.onrender.com/api/students/";

loadStudents();

function loadStudents(){

fetch(API)

.then(res=>res.json())

.then(data=>{

let rows="";

data.forEach(student=>{

rows+=`

<tr>

<td>${student.id}</td>

<td>${student.name}</td>
<td>${student.email}</td>
<td>${student.age}</td>

<td>

<button class="action-btn edit-btn"
onclick="editStudent(${student.id}, '${student.name}', '${student.email}', ${student.age})">
Edit
</button>

<button class="action-btn delete-btn"
onclick="deleteStudent(${student.id})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("studentTable").innerHTML=rows;

});

}

function saveStudent(){

const id=document.getElementById("studentId").value;

const student={

name:document.getElementById("name").value,
   email: document.getElementById("email").value,
age:document.getElementById("age").value

};

if(id==""){

fetch(API,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(student)

})

.then(()=>{

clearForm();

loadStudents();

});

}

else{

fetch(API+id+"/",{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(student)

})

.then(()=>{

clearForm();

loadStudents();

});

}

}

function editStudent(id, name, email, age) {

    document.getElementById("studentId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
    document.getElementById("age").value = age;
}

function deleteStudent(id){

if(confirm("Delete Student?")){

fetch(API+id+"/",{

method:"DELETE"

})

.then(()=>loadStudents());

}

}

function clearForm(){

document.getElementById("studentId").value="";

document.getElementById("name").value="";
    document.getElementById("email").value="";
document.getElementById("age").value="";

}

function sendEmail() {
  const email = document.getElementById("mail").value;
  const btn = document.getElementById("sendBtn");
  const msg = document.getElementById("msg");


    if(email === ""){
        msg.innerHTML = "Please enter an email.";
        msg.style.color = "red";
        return;
    }
     // Show loading state
    btn.disabled = true;
    btn.innerHTML = "Loading...";
    msg.innerHTML = "";

  fetch("https://djangoapi-f17z.onrender.com/api/send-email/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email
        })
    })
    .then(response => response.json())
    .then(data => {

        msg.innerHTML = data.message;
        msg.style.color = "green";

    })
    .catch(error => {

        msg.innerHTML = "Failed to send email.";
        msg.style.color = "red";

    })
    .finally(() => {

        // Restore button
        btn.disabled = false;
        btn.innerHTML = "Send Email";

    });
}
 


</script>

</body>

</html>
